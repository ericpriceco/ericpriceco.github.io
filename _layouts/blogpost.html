{% include header.html %}

<section class="sub-cta">
        <div class="container">
            <div class="sixteen columns text-center">
                <h2>MY BLOG</h2>
                <h4>News, guides and resources</h4>
                <div class="divider"></div>
            </div>
        </div>
</section>

<section class="blog-post">
    <div class="container">
        <div class="sixteen columns">
                <div class="text-center bottom-3">
                        <img src="{{ page.headerimg }}">
                </div>
            <h3> {{ page.title }} </h3>
            <p> {{ page.date | date_to_long_string }} </p>
           {{ content }}
        </div>
    </div>
</section>

{% include footer.html %}

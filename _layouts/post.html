{% include header.html %}

<div class="blog-post">
    <div class="row">
        <div class="large-10 medium-10 columns small-centered">
            <div class="post-header">
                <h1> {{ page.title }} </h1>
                <p> {{ page.date | date: '%B %d, %Y' }} - {% for tag in page.tags %}
                       <span>#<a href="/blog/tags/{{ tag }}/">{{ tag }}</a></span>
                    {% endfor %} </p>

                <div class="post-share">
                    <p>Share this post:
                        <a href="https://plus.google.com/share?url=http://eric-price.net{{ page.url }}">Google</a><span> - </span>
                        <a href="http://twitter.com/share?text={{ post.title }}&url=http://eric-price.net{{ page.url }}">Twitter</a><span> - </span>
                        <a href="https://www.facebook.com/sharer/sharer.php?u=http://eric-price.net{{ page.url }}">Facebook</a>
                    </p>
                </div>
            </div>

            {{ content }}

            <div class="disqus">
                <div id="disqus_thread"></div>
                    <script type="text/javascript">
                        /* * * CONFIGURATION VARIABLES * * */
                        var disqus_shortname = 'ericpricenet';

                        /* * * DON'T EDIT BELOW THIS LINE * * */
                        (function() {
                            var dsq = document.createElement('script'); dsq.type = 'text/javascript'; dsq.async = true;
                            dsq.src = '//' + disqus_shortname + '.disqus.com/embed.js';
                            (document.getElementsByTagName('head')[0] || document.getElementsByTagName('body')[0]).appendChild(dsq);
                        })();
                    </script>
                    <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript" rel="nofollow">comments powered by Disqus.</a></noscript>
            </div>
        </div>
    </div>
</div>

{% include footer.html %}

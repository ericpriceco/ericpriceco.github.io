---
layout: blog
title: Eric Price - Web Designer and Developer
---

<section class="blog">
    <div class="row">
        <div class="large-9 medium-10 columns medium-centered">
            
            <div class="tag-header">
                <p>#Foundation</p>
            </div>
                
                {% for post in site.tags.foundation %}
            
                    <div class="posts-list">
                        <div class="post-title"><a href="{{ post.url }}"><span>{{ post.title }}</span></a> / Published {{ post.date | date: '%B %d, %Y' }} - {% for tag in post.tags %} #<a href="/blog/tags/{{ tag }}/">{{ tag }}</a>{% endfor %}</div>
                        
                        <hr>
                    </div>
            
                {% endfor %}
        
        </div>
    </div>
</section>

<div class="tag-spacer"></div>

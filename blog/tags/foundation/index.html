---
layout: main
title: Blog - Eric Price - Freelance Web Design and Developer
---

<div class="sub-cta">
    <header>
        <h1>VARIOUS HELPFUL THINGS</h1>
        <h3>Giving back to the web community</h3>
    </header>
</div>
    
</div> <!--End CTA Background -->

    <section class="blog">
        <div class="pure-g">
            <div class="pure-u-3-5 grid-center">
                    {% for post in site.tags.foundation limit: 5 %}
                        <div class="posts-list">
                        <div class="blog-header">
                            <h2><a href="{{ post.url }}">{{ post.title }}</a></h2>
                            <p>{{ post.date | date_to_string }}</p>
                        </div>
                        <p>{{ post.excerpt }}</p>
                        <p><a href="{{ post.url }}">Read More</a></p>
                    {% endfor %}
                    </div>
            </div>
        </div>
    </section>

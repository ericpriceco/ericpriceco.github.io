---
layout: default
title: Eric Price - Web Developer
---

<div class="post-header">
    <h1>#SASS</h1>
</div>

<div class="blog">
    <div class="row">
        <div class="offset-by-two nine columns">

{% for post in site.tags.sass %}

    <div class="posts-list">
        <div class="blog-header">
            <h1><a href="{{ post.url }}">{{ post.title }}</a></h1>
            <p class="post-date">{{ post.date | date: '%B %d, %Y' }} - {% for tag in post.tags %} #<a href="/blog/tags/{{ tag }}/">{{ tag }}</a>{% endfor %} </p>
        </div>
            <p>{{ post.content | strip_html | truncatewords:65 }} <a href="{{ post.url }}">[Read More]</a></p>

    </div>

{% endfor %}

</div>
</div>
</div>
